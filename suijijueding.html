<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ 心心小宝随机决定器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0f1a3a 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.loading {
            overflow: hidden;
        }

        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0f1a3a 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-planet {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2, #f64f59);
            box-shadow: 0 0 60px rgba(102, 126, 234, 0.5), inset -20px -20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: planetFloat 2s ease-in-out infinite;
        }

        .loader-planet::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -30px;
            right: -30px;
            height: 20px;
            background: linear-gradient(90deg, transparent, rgba(255, 200, 150, 0.3), rgba(255, 200, 150, 0.6), rgba(255, 200, 150, 0.3), transparent);
            border-radius: 50%;
            transform: rotateX(70deg);
            animation: ringRotate 3s linear infinite;
        }

        .loader-planet::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            filter: blur(5px);
        }

        @keyframes planetFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        @keyframes ringRotate {
            0% { transform: rotateX(70deg) rotateZ(0deg); }
            100% { transform: rotateX(70deg) rotateZ(360deg); }
        }

        .loader-stars {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .loader-star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: loaderStarTwinkle 1.5s ease-in-out infinite;
        }

        @keyframes loaderStarTwinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .loader-text {
            margin-top: 40px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 3px;
            animation: textPulse 2s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .loader-progress {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .loader-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #f64f59);
            border-radius: 10px;
            animation: progressLoad 3s ease-out forwards;
        }

        @keyframes progressLoad {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px 100px;
        }

        .header {
            text-align: center;
            padding: 30px 0 20px;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(120, 80, 255, 0.12) 0%, transparent 60%);
            filter: blur(50px);
            animation: headerGlow 4s ease-in-out infinite;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 16px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(102, 126, 234, 0.1);
            backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.4s;
            border: 1px solid rgba(102, 126, 234, 0.2);
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            color: #fff;
        }

        .back-btn span {
            animation: starSpin 4s linear infinite;
        }

        @keyframes starSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes headerGlow {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }

        .logo {
            font-size: 52px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
            position: relative;
            display: inline-block;
        }

        .logo::before,
        .logo::after {
            content: '✦';
            position: absolute;
            font-size: 14px;
            color: rgba(255, 200, 150, 0.6);
            animation: starOrbit 4s linear infinite;
        }

        .logo::before {
            top: -5px;
            left: -20px;
            animation-duration: 3s;
        }

        .logo::after {
            bottom: -5px;
            right: -20px;
            animation-duration: 5s;
            animation-direction: reverse;
        }

        @keyframes starOrbit {
            0% { transform: rotate(0deg) scale(1); opacity: 0.6; }
            50% { opacity: 1; transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); opacity: 0.6; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(167, 139, 250, 0.3);
        }

        .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 6px;
        }

        .card {
            background: transparent;
            border-radius: 0;
            padding: 0;
            margin-bottom: 24px;
            border: none;
            box-shadow: none;
            position: relative;
        }

        .card-icon {
            font-size: 22px;
            margin-right: 10px;
        }

        .section-title {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            gap: 14px;
        }

        .input-container {
            flex: 1;
            position: relative;
        }

        .input-text {
            width: 100%;
            height: 56px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0 20px;
            padding-left: 48px;
            font-size: 15px;
            color: #fff;
            outline: none;
            transition: all 0.4s;
        }

        .input-text::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-text:focus {
            border-color: rgba(167, 139, 250, 0.6);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1), 0 0 30px rgba(167, 139, 250, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0.5;
            animation: iconGlow 2s ease-in-out infinite;
        }

        @keyframes iconGlow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }

        .add-btn {
            width: 100px;
            height: 56px;
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 16px;
            background: rgba(167, 139, 250, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .add-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: 0.6s;
        }

        .add-btn:hover::before {
            left: 100%;
        }

        .add-btn:hover {
            background: rgba(167, 139, 250, 0.2);
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 0 25px rgba(167, 139, 250, 0.3);
            transform: translateY(-2px);
        }

        .add-btn:active {
            transform: scale(0.96);
        }

        .tag-box {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            max-height: 180px;
            overflow-y: auto;
            padding: 4px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(167, 139, 250, 0.1);
            backdrop-filter: blur(10px);
            color: #e0e7ff;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            border: 1px solid rgba(167, 139, 250, 0.2);
            animation: tagAppear 0.4s ease;
            cursor: default;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .tag::before {
            content: '✦';
            font-size: 10px;
            opacity: 0.5;
            margin-right: 2px;
        }

        .tag:hover {
            background: rgba(167, 139, 250, 0.2);
            border-color: rgba(167, 139, 250, 0.4);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.2);
        }

        .tag-delete {
            margin-left: 6px;
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.2s;
            font-size: 12px;
        }

        .tag-delete:hover {
            opacity: 1;
            color: #f87171;
        }

        @keyframes tagAppear {
            from { opacity: 0; transform: scale(0.8) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.3);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.4;
            animation: emptyFloat 3s ease-in-out infinite;
        }

        @keyframes emptyFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .result-card {
            text-align: center;
            padding: 40px 24px;
            background: transparent;
            position: relative;
        }

        .result-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .result-text {
            font-size: 38px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 40px rgba(167, 139, 250, 0.6);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-text.roll {
            animation: textPulse 0.1s infinite alternate;
        }

        @keyframes textPulse {
            0% { opacity: 0.85; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        .result-text.selected {
            animation: selectedGlow 0.6s ease-out;
        }

        @keyframes selectedGlow {
            0% { transform: scale(1.25); text-shadow: 0 0 80px rgba(167, 139, 250, 1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn-row {
            display: flex;
            gap: 16px;
        }

        .btn {
            flex: 1;
            padding: 18px 0;
            border: 1px solid;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1), transparent);
            transition: 0.8s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-icon {
            font-size: 18px;
            position: relative;
            z-index: 1;
        }

        .btn span:last-child {
            position: relative;
            z-index: 1;
        }

        .btn-start {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1), inset 0 0 30px rgba(16, 185, 129, 0.05);
        }

        .btn-start:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.6);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3), inset 0 0 40px rgba(16, 185, 129, 0.1);
            transform: translateY(-3px);
        }

        .btn-stop {
            background: rgba(236, 72, 153, 0.1);
            border-color: rgba(236, 72, 153, 0.3);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.1), inset 0 0 30px rgba(236, 72, 153, 0.05);
        }

        .btn-stop:hover {
            background: rgba(236, 72, 153, 0.2);
            border-color: rgba(236, 72, 153, 0.6);
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.3), inset 0 0 40px rgba(236, 72, 153, 0.1);
            transform: translateY(-3px);
        }

        .btn-reset {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.1), inset 0 0 30px rgba(139, 92, 246, 0.05);
        }

        .btn-reset:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.6);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3), inset 0 0 40px rgba(139, 92, 246, 0.1);
            transform: translateY(-3px);
        }

        .stat-card {
            background: transparent;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .stat-title {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-badge {
            background: rgba(102, 126, 234, 0.2);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .stat-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 240px;
            overflow-y: auto;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .stat-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #667eea, #f64f59);
            opacity: 0;
            transition: 0.3s;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(4px);
        }

        .stat-item:hover::before {
            opacity: 1;
        }

        .stat-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-rank {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(167, 139, 250, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(167, 139, 250, 0.2);
        }

        .stat-rank.gold { 
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.3), rgba(245, 158, 11, 0.3)); 
            border-color: rgba(251, 191, 36, 0.5);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
        }
        .stat-rank.silver { 
            background: linear-gradient(135deg, rgba(209, 213, 219, 0.3), rgba(156, 163, 175, 0.3)); 
            border-color: rgba(209, 213, 219, 0.5);
        }
        .stat-rank.bronze { 
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.3), rgba(180, 83, 9, 0.3)); 
            border-color: rgba(217, 119, 6, 0.5);
        }

        .stat-name {
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 500;
        }

        .stat-count {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-number {
            background: linear-gradient(135deg, #667eea, #764ba2, #f64f59);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 18px;
            font-weight: 700;
        }

        .stat-unit {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .footer {
            text-align: center;
            padding: 40px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }

        .footer span {
            color: #667eea;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(167, 139, 250, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(167, 139, 250, 0.5); }
    </style>
</head>
<body class="loading">

<div class="loader" id="loader">
    <div class="loader-stars" id="loaderStars"></div>
    <div class="loader-planet"></div>
    <div class="loader-text">正在进入小宝随机决定空间...</div>
    <div class="loader-progress">
        <div class="loader-progress-bar"></div>
    </div>
</div>

<canvas id="bgCanvas"></canvas>

<div class="container">
    <div class="header">
        <button class="back-btn" onclick="location.href='index.html'">
            <span>✦</span> 返回主页
        </button>
        <div class="logo">🌌</div>
        <h1 class="title">随机决定器</h1>
        <p class="subtitle">COSMIC CHOICE MAKER</p>
    </div>

    <div class="card">
        <h3 class="section-title">
            <span class="card-icon">✍️</span> 录入选项
        </h3>
        <div class="input-wrapper">
            <div class="input-container">
                <span class="input-icon">✨</span>
                <input type="text" class="input-text" id="inputText" placeholder="输入你的选项...">
            </div>
            <button class="add-btn" id="addBtn">+ 录入</button>
        </div>
    </div>

    <div class="card">
        <h3 class="section-title">
            <span class="card-icon">📋</span> 候选列表
            <span id="tagCount" style="margin-left:auto;font-size:12px;color:rgba(255,255,255,0.4);">0 个选项</span>
        </h3>
        <div class="tag-box" id="tagBox">
            <div class="empty-state">
                <div class="empty-state-icon">🌟</div>
                <div>暂无选项</div>
                <div style="font-size:12px;margin-top:8px;">添加选项开始随机吧</div>
            </div>
        </div>
    </div>

    <div class="card result-card">
        <div class="result-label">✨ 本次随机结果 ✨</div>
        <div class="result-text" id="result">录入词进行筛选...</div>
    </div>

    <div class="card">
        <div class="btn-group">
            <div class="btn-row">
                <button class="btn btn-start" id="start">
                    <span class="btn-icon">🎲</span>
                    <span>开始随机</span>
                </button>
                <button class="btn btn-stop" id="stop">
                    <span class="btn-icon">⏸️</span>
                    <span>停止选中</span>
                </button>
            </div>
            <button class="btn btn-reset" id="reset">
                <span class="btn-icon">🔄</span>
                <span>清空重置</span>
            </button>
        </div>
    </div>

    <div class="card stat-card">
        <div class="stat-header">
            <h3 class="stat-title">
                <span class="card-icon">📊</span> 选中统计
            </h3>
            <span class="stat-badge" id="totalCount">总计 0 次</span>
        </div>
        <div class="stat-list" id="statList">
            <div class="empty-state">
                <div class="empty-state-icon">📈</div>
                <div>暂无数据</div>
            </div>
        </div>
    </div>

    <div class="footer">
        Love 心心小宝 <span>♥</span> | 2022.9.23 
    </div>
</div>

<script>
    const loaderStars = document.getElementById('loaderStars');
    for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'loader-star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        star.style.width = Math.random() * 3 + 2 + 'px';
        star.style.height = star.style.width;
        loaderStars.appendChild(star);
    }

    setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
        document.body.classList.remove('loading');
    }, 3000);

    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    let stars = [];
    let meteors = [];
    let nebulaClouds = [];

    class Star {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * w;
            this.y = Math.random() * h;
            this.r = Math.random() * 2;
            this.alpha = Math.random() * 0.5 + 0.2;
            this.twinkleSpeed = Math.random() * 0.02 + 0.01;
            this.twinklePhase = Math.random() * Math.PI * 2;
        }
        draw() {
            this.twinklePhase += this.twinkleSpeed;
            const alpha = this.alpha + Math.sin(this.twinklePhase) * 0.3;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, alpha)})`;
            ctx.fill();
        }
    }

    class Meteor {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = -50;
            this.y = Math.random() * h * 0.6;
            this.len = Math.random() * 100 + 80;
            this.speed = Math.random() * 6 + 6;
            this.opacity = Math.random() * 0.5 + 0.4;
            this.hue = Math.random() * 60 + 200;
            this.angle = -25 * (Math.PI / 180);
        }
        update() {
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
        }
        draw() {
            const endX = this.x + Math.cos(this.angle) * this.len;
            const endY = this.y + Math.sin(this.angle) * this.len;
            const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
            gradient.addColorStop(0, `hsla(${this.hue}, 80%, 90%, ${this.opacity})`);
            gradient.addColorStop(0.3, `hsla(${this.hue}, 70%, 70%, ${this.opacity * 0.8})`);
            gradient.addColorStop(1, 'transparent');
            ctx.save();
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 2.5;
            ctx.shadowBlur = 20;
            ctx.shadowColor = `hsla(${this.hue}, 80%, 70%, 0.6)`;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            ctx.restore();
        }
    }

    class NebulaCloud {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * w;
            this.y = Math.random() * h;
            this.r = Math.random() * 200 + 100;
            this.hue = Math.random() * 60 + 240;
            this.opacity = Math.random() * 0.03 + 0.01;
            this.drift = Math.random() * 0.2 + 0.05;
        }
        update() {
            this.x += this.drift;
            if (this.x > w + this.r) {
                this.x = -this.r;
                this.y = Math.random() * h;
            }
        }
        draw() {
            const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
            gradient.addColorStop(0, `hsla(${this.hue}, 60%, 50%, ${this.opacity})`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function init() {
        stars = [];
        meteors = [];
        nebulaClouds = [];
        for (let i = 0; i < 400; i++) stars.push(new Star());
        for (let i = 0; i < 5; i++) nebulaClouds.push(new NebulaCloud());
    }

    function animate() {
        ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
        ctx.fillRect(0, 0, w, h);

        nebulaClouds.forEach(n => { n.update(); n.draw(); });
        stars.forEach(s => s.draw());

        if (Math.random() < 0.02) {
            meteors.push(new Meteor());
        }

        meteors.forEach((m, i) => {
            m.update();
            m.draw();
            if (m.x > w + 100 || m.y > h + 100) meteors.splice(i, 1);
        });

        requestAnimationFrame(animate);
    }

    init();
    animate();

    window.addEventListener('resize', () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        init();
    });

    const inputText = document.getElementById('inputText');
    const addBtn = document.getElementById('addBtn');
    const tagBox = document.getElementById('tagBox');
    const tagCount = document.getElementById('tagCount');
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const resetBtn = document.getElementById('reset');
    const result = document.getElementById('result');
    const statList = document.getElementById('statList');
    const totalCount = document.getElementById('totalCount');

    let list = [];
    let count = {};
    let timer = null;

    inputText.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addOption();
    });

    function addOption() {
        const val = inputText.value.trim();
        if (!val) { shakeInput(); return; }
        if (list.includes(val)) {
            shakeInput();
            inputText.value = '';
            return;
        }
        list.push(val);
        renderTags();
        inputText.value = '';
        inputText.focus();
    }

    function shakeInput() {
        inputText.style.animation = 'none';
        inputText.offsetHeight;
        inputText.style.animation = 'shake 0.3s ease';
    }

    const style = document.createElement('style');
    style.textContent = `
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    `;
    document.head.appendChild(style);

    addBtn.addEventListener('click', addOption);

    function renderTags() {
        tagCount.textContent = `${list.length} 个选项`;
        if (list.length === 0) {
            tagBox.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🌟</div>
                    <div>暂无选项</div>
                    <div style="font-size:12px;margin-top:8px;">添加选项开始随机吧</div>
                </div>
            `;
            return;
        }
        tagBox.innerHTML = '';
        list.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'tag';
            div.innerHTML = `${item}<span class="tag-delete" onclick="removeTag(${idx})">✕</span>`;
            tagBox.appendChild(div);
        });
    }

    window.removeTag = function(idx) {
        list.splice(idx, 1);
        renderTags();
    };

    startBtn.addEventListener('click', () => {
        if (list.length < 1) { shakeInput(); return; }
        clearInterval(timer);
        result.classList.add('roll');
        result.classList.remove('selected');
        timer = setInterval(() => {
            const idx = Math.floor(Math.random() * list.length);
            result.textContent = list[idx];
        }, 80);
    });

    stopBtn.addEventListener('click', () => {
        if (!timer) return;
        clearInterval(timer);
        timer = null;
        result.classList.remove('roll');
        result.classList.add('selected');
        const val = result.textContent;
        if (val && val !== '等待你的选择...') {
            count[val] = (count[val] || 0) + 1;
            updateStat();
        }
    });

    resetBtn.addEventListener('click', () => {
        clearInterval(timer);
        timer = null;
        list = [];
        count = {};
        inputText.value = '';
        renderTags();
        result.textContent = '等待你的选择...';
        result.classList.remove('roll', 'selected');
        statList.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">📈</div>
                <div>暂无数据</div>
            </div>
        `;
        totalCount.textContent = '总计 0 次';
    });

    function updateStat() {
        const sorted = Object.entries(count).sort((a, b) => b[1] - a[1]);
        const total = Object.values(count).reduce((sum, n) => sum + n, 0);
        totalCount.textContent = `总计 ${total} 次`;

        if (sorted.length === 0) {
            statList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📈</div>
                    <div>暂无数据</div>
                </div>
            `;
            return;
        }

        const maxCount = sorted[0][1];
        statList.innerHTML = '';
        sorted.forEach(([key, val], idx) => {
            const rankClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
            const percentage = (val / maxCount) * 100;
            const item = document.createElement('div');
            item.className = 'stat-item';
            item.innerHTML = `
                <div class="stat-info">
                    <span class="stat-rank ${rankClass}">${idx + 1}</span>
                    <span class="stat-name">${key}</span>
                </div>
                <div class="stat-count">
                    <span class="stat-number">${val}</span>
                    <span class="stat-unit">次</span>
                </div>
            `;
            statList.appendChild(item);
        });
    }
</script>
</body>
</html>
