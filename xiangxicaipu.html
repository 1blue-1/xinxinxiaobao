        // 打开菜谱详情
        function openRecipe(recipeId) {
            // 移除所有按钮的边框
            const buttons = document.querySelectorAll('button[onclick^="openRecipe"]');
            buttons.forEach(btn => {
                btn.classList.remove('border-2', 'border-red-300');
            });
            
            const recipe = recipes[recipeId];
            if (recipe) {
                document.getElementById('modalTitle').innerHTML = recipe.title;
                document.getElementById('modalContent').innerHTML = recipe.content;
                document.getElementById('recipeModal').classList.remove('hidden');
                document.getElementById('recipeModal').classList.add('flex');
            }
        }

        // 关闭菜谱详情
        function closeRecipe() {
            document.getElementById('recipeModal').classList.add('hidden');
            document.getElementById('recipeModal').classList.remove('flex');
        }

        // 搜索功能
        function searchFood() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const buttons = document.querySelectorAll('button[onclick^="openRecipe"]');
            let count = 0;
            
            // 移除所有按钮的边框
            buttons.forEach(btn => {
                btn.classList.remove('border-2', 'border-red-300', 'animate-pulse');
            });
            
            buttons.forEach(button => {
                // 始终显示所有菜品
                button.parentElement.style.display = 'block';
                
                const text = button.textContent.toLowerCase();
                if (text.includes(input) && input !== '') {
                    count++;
                    // 滚动到找到的菜品
                    button.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // 添加闪耀动画
                    button.classList.add('border-2', 'border-red-300', 'animate-pulse');
                    
                    // 三次闪耀后定格
                    let flashCount = 0;
                    const flashInterval = setInterval(() => {
                        flashCount++;
                        if (flashCount >= 3) {
                            clearInterval(flashInterval);
                            button.classList.remove('animate-pulse');
                        }
                    }, 500);
                }
            });
            
            // 为所有按钮添加点击事件，点击后移除边框
            buttons.forEach(button => {
                // 保存原始的onclick事件
                const originalOnClick = button.onclick;
                button.onclick = function() {
                    // 移除边框
                    button.classList.remove('border-2', 'border-red-300');
                    // 执行原始的onclick事件
                    if (originalOnClick) {
                        originalOnClick();
                    }
                };
            });
            
            document.getElementById('searchTip').textContent = `找到 ${count} 道相关美食，快来试试吧~`;
        }

        // 回车搜索
        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') {
                searchFood();
            }
        });

        // 初始加载显示全部
        window.onload = function() {
            searchFood();
        }
    </script>
    
    <!-- 回到顶部和搜索按钮 -->

        </a>
    </div>
